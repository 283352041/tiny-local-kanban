<!doctype html><html><head><meta charset="utf-8"><title>Tiny Local Kanban</title><style>body{font-family:system-ui;margin:0;background:#f6f7f9;color:#17202a}header{padding:1rem;background:white;border-bottom:1px solid #ddd;display:flex;gap:.5rem}main{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:1rem}.col{background:white;border:1px solid #ddd;border-radius:8px;min-height:70vh;padding:1rem}.card{border:1px solid #d0d7de;border-radius:6px;padding:.7rem;margin:.5rem 0;background:#fff}input,button{padding:.55rem}</style></head><body><header><input id="text" placeholder="New task"><button id="add">Add</button><button id="export">Export Markdown</button></header><main id="board"></main><script>const cols=["Todo","Doing","Done"];let data=JSON.parse(localStorage.kanban||"{}");cols.forEach(c=>data[c]??=[]);function save(){localStorage.kanban=JSON.stringify(data)}function render(){board.innerHTML="";cols.forEach(c=>{const col=document.createElement("section");col.className="col";col.innerHTML="<h2>"+c+"</h2>";data[c].forEach((t,i)=>{const card=document.createElement("div");card.className="card";card.textContent=t;card.onclick=()=>{data[c].splice(i,1);data[cols[(cols.indexOf(c)+1)%3]].push(t);save();render()};col.append(card)});board.append(col)})}add.onclick=()=>{if(text.value.trim()){data.Todo.push(text.value.trim());text.value="";save();render()}};export.onclick=()=>{const md=cols.map(c=>"## "+c+"\n"+data[c].map(x=>"- "+x).join("\n")).join("\n\n");navigator.clipboard?.writeText(md);alert(md)};render();</script></body></html>
